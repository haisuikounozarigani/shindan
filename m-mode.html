<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>　</title>
<style>
  :root{
    --void:#05030c;
    --panel:#1d1238;
    --panel2:#2a1a4c;
    --line:#3a2860;
    --line-str:#5a3a8c;
    --violet:#c99dff;
    --violet-dim:#8b5fd0;
    --pink:#ff84bf;
    --pink-dim:#cf5d97;
    --text:#f6eeff;
    --muted:#bcabdc;
    --faint:#8676a4;
    --ok:#5fe6a8;
    --love:0;
    --night:0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#05030c;height:100%;}
  body{
    color:var(--text);
    font-family:"Hiragino Sans","Meiryo",sans-serif;
    font-size:15px;line-height:1.8;
    min-height:100vh;min-height:100dvh;
    display:flex;justify-content:center;align-items:stretch;
    position:relative;overflow-x:hidden;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(140,80,220,calc(0.08 + var(--night)*0.16)) 0%, transparent 60%),
      radial-gradient(100% 70% at 80% 115%, rgba(255,90,170,calc(0.04 + var(--love)*0.2)) 0%, transparent 60%),
      linear-gradient(180deg,#09040f 0%,#040209 100%);
    transition:background 1.6s ease;
    -webkit-tap-highlight-color:transparent;
  }
  #dust{position:fixed;inset:0;z-index:0;pointer-events:none;}
  body::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(255,255,255,0.014) 0,rgba(255,255,255,0.014) 1px,transparent 1px,transparent 3px);mix-blend-mode:overlay;opacity:0.55;}
  body::before{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(120% 100% at 50% 42%, transparent 50%, rgba(0,0,0,calc(0.3 + var(--night)*0.32)) 100%);}
  .app{width:100%;max-width:540px;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;position:relative;z-index:2;padding:0 0 env(safe-area-inset-bottom);}

  /* ===== HUD ===== */
  .hud{position:sticky;top:0;z-index:30;padding:11px 16px 10px;background:linear-gradient(180deg,rgba(7,4,15,0.97),rgba(7,4,15,0.82));border-bottom:1px solid var(--line);backdrop-filter:blur(10px);}
  .hud-top{display:flex;align-items:center;gap:11px;}
  .face{width:38px;height:38px;border-radius:50%;flex-shrink:0;position:relative;background:radial-gradient(circle at 36% 32%,#fbf0ff 0%,#e0b8ff 32%,#9a5fe6 72%,#5a2f9a 100%);box-shadow:0 0 16px rgba(192,137,255,0.6),inset 0 0 7px rgba(255,255,255,0.5);animation:fglow 4s ease-in-out infinite;overflow:hidden;}
  .face::after{content:"";position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(50,20,80,0.35);top:9px;left:9px;}
  .face img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .face.hasimg::after{display:none;}
  @keyframes fglow{0%,100%{box-shadow:0 0 13px rgba(192,137,255,0.5),inset 0 0 7px rgba(255,255,255,0.5);}50%{box-shadow:0 0 24px rgba(255,109,176,0.6),inset 0 0 7px rgba(255,255,255,0.5);}}
  .face.warm{animation-duration:1.5s;}
  .hud-meta{flex:1;min-width:0;}
  .hud-name{font-size:0.9em;font-weight:700;letter-spacing:0.03em;display:flex;align-items:center;gap:7px;}
  .hud-name .tag{font-size:0.56em;color:var(--faint);border:1px solid var(--line-str);border-radius:5px;padding:1px 5px;letter-spacing:0.16em;font-family:monospace;}
  .hearts{display:flex;gap:3px;margin-top:3px;align-items:center;}
  .heart{width:15px;height:15px;position:relative;flex-shrink:0;}
  .heart svg{width:100%;height:100%;display:block;}
  .heart .hb{fill:#241a3a;stroke:var(--line-str);stroke-width:6;}
  .heart .hf{fill:url(#hg);opacity:0;transform-origin:center;transition:opacity .4s;}
  .heart.lit .hf{opacity:1;animation:pop .5s cubic-bezier(.2,1.5,.4,1);}
  .heart.half .hf{opacity:1;clip-path:inset(0 50% 0 0);}
  @keyframes pop{0%{transform:scale(.3);}60%{transform:scale(1.25);}100%{transform:scale(1);}}
  .love-pct{margin-left:6px;font-size:0.64em;font-family:monospace;color:var(--pink);letter-spacing:0.08em;}
.ticks{
  display:grid;
  grid-template-columns:repeat(60,1fr);
  gap:2px;
  margin-top:8px;
}
.tick{
  min-width:0;
  height:3px;
  border-radius:2px;
  background:var(--line);
  transition:background .3s,box-shadow .3s;
}
@media(max-width:420px){
  .ticks{
    grid-template-columns:repeat(40,1fr);
  }
}
  .tick.done{background:linear-gradient(90deg,var(--violet),var(--pink));box-shadow:0 0 6px rgba(192,137,255,0.6);}

  .stage{flex:1;display:flex;flex-direction:column;justify-content:flex-start;padding:0;position:relative;}

  /* ===== ADV立ち絵レイヤー ===== */
  .sprite-wrap{position:relative;width:100%;height:clamp(220px,38vh,340px);overflow:hidden;flex-shrink:0;}
  .sprite{position:absolute;left:50%;bottom:0;transform:translateX(-50%);height:100%;width:auto;max-width:none;object-fit:contain;object-position:bottom center;
    filter:drop-shadow(0 6px 24px rgba(0,0,0,0.5));
    opacity:0;transition:opacity .55s ease;}
  .sprite.show{opacity:1;}
  .sprite.swap{animation:spriteSwap .5s ease;}
  @keyframes spriteSwap{0%{opacity:.2;transform:translateX(-50%) scale(.98);}100%{opacity:1;transform:translateX(-50%) scale(1);}}
  /* 立ち絵が無い時の代替グロウ */
  .sprite-fallback{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:120px;height:120px;border-radius:50%;background:radial-gradient(circle at 36% 32%,#fff,#e0b8ff 38%,#9a5fe6 74%,#4a2585);box-shadow:0 0 50px rgba(255,132,191,0.4),inset 0 0 20px rgba(255,255,255,0.35);animation:fglow 4s ease-in-out infinite;}
  .sprite-fallback::after{content:"";position:absolute;width:28px;height:28px;border-radius:50%;background:rgba(40,16,70,0.4);top:32px;left:46px;}
  .sprite-wrap.bottom-fade::after{content:"";position:absolute;left:0;right:0;bottom:0;height:60px;background:linear-gradient(0deg,#070310,transparent);pointer-events:none;}

  .panel{padding:0 18px 26px;position:relative;}

  /* ===== イントロ ===== */
  .intro{text-align:center;animation:fadein .8s ease both;padding-top:6px;}
  @keyframes fadein{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .eyebrow{font-size:0.62em;font-family:monospace;letter-spacing:0.34em;color:var(--faint);margin-bottom:14px;}
  .intro h1{font-size:1.6em;font-weight:800;letter-spacing:0.06em;line-height:1.42;margin-bottom:10px;}
  .intro h1 .accent{color:var(--pink);text-shadow:0 0 16px rgba(255,132,191,0.4);}
  .intro .lead{font-size:0.86em;color:var(--muted);max-width:360px;margin:0 auto 6px;}
  .intro .lead em{color:var(--pink);font-style:normal;}
  .name-field{margin:22px auto 0;max-width:300px;}
  .name-field label{display:block;font-size:0.66em;color:var(--faint);letter-spacing:0.06em;margin:0 2px 7px;text-align:left;}
  .name-field input{width:100%;background:#0a0617;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font-size:0.9em;font-family:inherit;color:var(--text);text-align:center;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s;}
  .name-field input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(192,137,255,0.16);}
  .warn{font-size:0.72em;color:var(--faint);font-family:monospace;letter-spacing:0.03em;margin:18px auto 0;max-width:340px;border-top:1px solid var(--line);padding-top:13px;}

.savebox{
  max-width:340px;
  margin:18px auto 0;
  padding:14px 15px 15px;
  border:1px solid var(--line-str);
  border-radius:16px;
  background:linear-gradient(165deg,rgba(255,132,191,0.08),rgba(192,137,255,0.05));
  box-shadow:0 10px 28px rgba(0,0,0,0.28);
  text-align:left;
}
.save-kicker{
  font-size:0.58em;
  font-family:monospace;
  letter-spacing:0.22em;
  color:var(--faint);
  margin-bottom:5px;
}
.save-main{
  font-size:0.9em;
  font-weight:800;
  color:var(--text);
  letter-spacing:0.03em;
}
.save-sub{
  font-size:0.68em;
  color:var(--muted);
  margin-top:2px;
}
.save-actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.save-resume,
.save-delete{
  flex:1;
  border-radius:999px;
  padding:10px 12px;
  font-family:inherit;
  font-size:0.76em;
  font-weight:800;
  letter-spacing:0.06em;
  cursor:pointer;
  transition:transform .1s,background .18s,box-shadow .18s;
}
.save-resume{
  border:1px solid var(--violet);
  background:linear-gradient(100deg,var(--violet-dim),var(--pink-dim));
  color:#fff;
  box-shadow:0 8px 22px rgba(192,137,255,0.22);
}
.save-delete{
  border:1px solid var(--line-str);
  background:rgba(10,6,23,0.55);
  color:var(--faint);
}
.save-resume:active,
.save-delete:active{transform:scale(.97);}
.save-delete:hover{background:rgba(192,137,255,0.08);color:var(--muted);}
  .cta{display:inline-block;margin:24px auto 0;border:none;cursor:pointer;font-family:inherit;background:linear-gradient(100deg,var(--violet),var(--pink));color:#fff;border-radius:32px;padding:15px 44px;font-size:0.96em;font-weight:800;letter-spacing:0.14em;box-shadow:0 10px 32px rgba(192,137,255,0.4);transition:transform .1s,box-shadow .2s;}
  .cta:active{transform:scale(.96);}
  .cta:hover{box-shadow:0 12px 40px rgba(255,109,176,0.5);}

  /* ===== ADVテキストボックス（幕間） ===== */
  .advbox{animation:fadein .55s ease both;}
  .adv-name{display:inline-block;font-size:0.78em;font-weight:800;letter-spacing:0.08em;color:var(--pink);background:linear-gradient(120deg,rgba(255,132,191,0.18),rgba(192,137,255,0.1));border:1px solid var(--line-str);border-radius:10px 10px 0 0;padding:5px 16px;margin-left:4px;text-shadow:0 0 10px rgba(255,132,191,0.4);}
  .adv-text{background:linear-gradient(165deg,rgba(29,18,56,0.96),rgba(20,12,40,0.96));border:1px solid var(--line-str);border-radius:0 14px 14px 14px;padding:18px 18px 16px;min-height:5.2em;font-size:0.98em;line-height:1.85;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
  .adv-text .pk{color:var(--pink);font-weight:700;}
  .caret{display:inline-block;width:2px;height:1em;background:var(--violet);margin-left:1px;vertical-align:-2px;animation:bl .8s steps(1) infinite;}
  @keyframes bl{0%,100%{opacity:1;}50%{opacity:0;}}
  .phase-meta{display:flex;align-items:center;gap:8px;margin:14px 2px 0;font-size:0.6em;font-family:monospace;letter-spacing:0.2em;color:var(--faint);}
  .phase-meta .st{color:var(--violet);font-size:1.1em;letter-spacing:0.12em;}
  .phase-meta .en{margin-left:auto;color:var(--violet-dim);}
  .adv-next{display:block;margin:18px auto 0;border:none;cursor:pointer;font-family:inherit;background:rgba(192,137,255,0.08);border:1.5px solid var(--line-str);color:var(--violet);border-radius:28px;padding:12px 36px;font-size:0.82em;font-weight:700;letter-spacing:0.1em;transition:background .15s,transform .1s;}
  .adv-next:active{transform:scale(.96);}
  .adv-next:hover{background:rgba(192,137,255,0.16);}
  .adv-next:disabled{opacity:.4;pointer-events:none;}

  /* ===== 質問 ===== */
  .qwrap{animation:qin .5s cubic-bezier(.2,.9,.3,1.05) both;}
  @keyframes qin{from{opacity:0;transform:translateY(16px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
  .q-eyebrow{display:flex;align-items:center;gap:8px;font-size:0.62em;font-family:monospace;letter-spacing:0.14em;color:var(--faint);margin-bottom:13px;}
  .q-eyebrow .chip{color:var(--violet);border:1px solid var(--line-str);border-radius:5px;padding:1px 7px;letter-spacing:0.12em;}
  .q-eyebrow .of{margin-left:auto;color:var(--pink);}
  .qcard{background:linear-gradient(165deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:22px 20px;position:relative;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04);}
  .qcard::before{content:"";position:absolute;top:-40%;left:-30%;width:80%;height:80%;background:radial-gradient(circle,rgba(192,137,255,0.12),transparent 70%);pointer-events:none;}
  .qtext{font-size:1.08em;font-weight:700;line-height:1.65;position:relative;}
  .qsub{font-size:0.75em;color:var(--faint);margin-top:9px;position:relative;font-style:italic;}
  .scale{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
  .opt{display:flex;align-items:center;gap:13px;cursor:pointer;font-family:inherit;text-align:left;background:#0a0617;border:1.5px solid var(--line);border-radius:14px;padding:12px 15px;transition:background .14s,border-color .16s,transform .08s,box-shadow .18s;}
  .opt:active{transform:scale(.985);}
  .opt:hover:not(.on){background:rgba(192,137,255,0.07);border-color:var(--line-str);box-shadow:0 0 18px rgba(192,137,255,0.12);}
  .opt .dot{width:26px;height:26px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--line-str);background:rgba(192,137,255,0.08);display:flex;align-items:center;justify-content:center;font-size:0.78em;font-weight:700;color:var(--violet);font-family:monospace;transition:.14s;}
  .opt .lbl{font-size:0.9em;color:var(--muted);transition:.14s;}
  .opt.on{background:linear-gradient(120deg,var(--violet-dim),var(--pink-dim));border-color:transparent;box-shadow:0 6px 22px rgba(194,79,138,0.36);}
  .opt.on .dot{background:rgba(255,255,255,0.28);border-color:transparent;color:#fff;}
  .opt.on .lbl{color:#fff;font-weight:700;}
  .qnav{display:flex;align-items:center;justify-content:space-between;margin-top:14px;}
  .back{background:none;border:none;color:var(--faint);font-size:0.8em;font-family:inherit;cursor:pointer;padding:6px 2px;transition:color .15s;}
  .back:hover:not(:disabled){color:var(--violet);}
  .back:disabled{opacity:.25;cursor:default;}
  .khint{font-size:0.62em;color:var(--faint);font-family:monospace;opacity:0.65;}
  .flyheart{position:fixed;z-index:40;pointer-events:none;font-size:18px;will-change:transform,opacity;}

  /* ===== 結果 ===== */
  .result{animation:fadein .8s ease both;}
  .ending-tag{text-align:center;font-size:0.6em;font-family:monospace;letter-spacing:0.34em;color:var(--faint);margin-bottom:4px;}
  .ending-name{text-align:center;font-size:1.5em;font-weight:800;letter-spacing:0.08em;margin-bottom:4px;}
  .ending-name .accent{color:var(--pink);text-shadow:0 0 16px rgba(255,132,191,0.45);}
  .ending-en{text-align:center;font-size:0.56em;font-family:monospace;letter-spacing:0.4em;color:var(--violet-dim);text-transform:uppercase;margin-bottom:16px;}

  .compat{background:linear-gradient(165deg,rgba(255,132,191,0.09),rgba(192,137,255,0.05));border:1px solid var(--line-str);border-radius:16px;padding:16px 18px 14px;margin:0 0 16px;text-align:center;}
  .compat .ct{font-size:0.58em;font-family:monospace;letter-spacing:0.22em;color:var(--faint);}
  .bigheart{display:flex;justify-content:center;gap:5px;margin:10px 0 2px;}
  .bigheart .bh{font-size:1.2em;filter:grayscale(1) brightness(.5);transition:filter .4s,transform .4s;}
  .bigheart .bh.on{filter:none;transform:scale(1.1);text-shadow:0 0 12px rgba(255,132,191,0.7);}
  .compat .cscore{font-size:2em;font-weight:800;color:var(--pink);text-shadow:0 0 18px rgba(255,132,191,0.5);line-height:1.2;}
  .compat .cverdict{font-size:1em;font-weight:700;letter-spacing:0.04em;}

  /* 物語風・ニアの語り */
  .story{margin:4px 0 18px;}
  .story-h{display:flex;align-items:center;gap:8px;font-size:0.6em;font-family:monospace;letter-spacing:0.2em;color:var(--faint);margin-bottom:10px;}
  .story-h::after{content:'';flex:1;height:1px;background:var(--line);}
  .story-card{background:linear-gradient(165deg,rgba(29,18,56,0.8),rgba(20,12,40,0.8));border:1px solid var(--line);border-left:3px solid var(--pink);border-radius:0 14px 14px 0;padding:16px 18px;font-size:0.9em;line-height:1.92;color:var(--text);}
  .story-card p{margin:0 0 12px;}
  .story-card p:last-child{margin:0;}
  .story-card .pk{color:var(--pink);font-weight:700;}
  .story-card .mu{color:var(--muted);}

  .rbars{margin:6px 0 14px;}
  .rbar{margin:11px 0;}
  .rbar .rb-top{display:flex;justify-content:space-between;font-size:0.78em;margin-bottom:5px;}
  .rbar .rb-top .nm{color:var(--text);font-weight:700;}
  .rbar .rb-top .vl{color:var(--violet);font-family:monospace;}
  .rbar .rb-track{height:8px;border-radius:4px;background:#0a0617;border:1px solid var(--line);overflow:hidden;position:relative;}
  .rbar .rb-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--pink));box-shadow:0 0 10px rgba(192,137,255,0.5);border-radius:4px;width:0;transition:width 1.1s cubic-bezier(.2,.8,.2,1);}
  .rbar .rb-mark{position:absolute;top:-3px;width:2px;height:14px;background:var(--ok);box-shadow:0 0 6px var(--ok);opacity:.8;}
  .marknote{font-size:0.66em;color:var(--faint);display:flex;align-items:center;gap:6px;margin-top:-4px;margin-bottom:14px;}
  .marknote i{display:inline-block;width:10px;height:3px;background:var(--ok);box-shadow:0 0 5px var(--ok);}

  .note{font-size:0.8em;color:var(--muted);background:rgba(255,132,191,0.06);border:1px solid var(--line);border-left:3px solid var(--pink);border-radius:0 10px 10px 0;padding:13px 15px;margin:14px 0;line-height:1.75;}
  .note b{color:var(--pink);}
  .out-actions{display:flex;gap:10px;}
  .gen,.copy{flex:1;border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:24px;padding:14px;font-size:0.86em;letter-spacing:0.06em;transition:transform .1s,box-shadow .2s;}
  .gen{background:linear-gradient(100deg,var(--violet),var(--pink));color:#fff;box-shadow:0 6px 22px rgba(192,137,255,0.4);}
  .gen:active{transform:scale(.97);}
  .copy{background:rgba(95,230,168,0.07);border:1.5px solid rgba(95,230,168,0.42);color:var(--ok);}
  .copy:active{transform:scale(.97);}
  .copy:hover{background:rgba(95,230,168,0.15);}
  .outbox{margin-top:14px;display:none;}
  .out-head{font-size:0.62em;font-family:monospace;letter-spacing:0.2em;color:var(--faint);display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .out-head::after{content:'';flex:1;height:1px;background:var(--line);}
  .outbox textarea{width:100%;min-height:260px;resize:vertical;font-family:"SFMono-Regular","Consolas","Courier New",monospace;font-size:0.72em;line-height:1.65;background:#0a0617;border:1.5px solid var(--line);border-radius:12px;color:var(--text);padding:12px;}
  .restart{display:block;margin:16px auto 4px;background:none;border:none;color:var(--faint);font-size:0.78em;font-family:inherit;text-decoration:underline;cursor:pointer;transition:color .15s;}
  .restart:hover{color:var(--violet);}
  .toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(14px);background:linear-gradient(100deg,var(--violet),var(--pink));color:#fff;padding:12px 24px;border-radius:30px;font-size:0.86em;font-weight:700;letter-spacing:0.06em;box-shadow:0 10px 30px rgba(192,137,255,0.5);z-index:80;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none !important;transition:none !important;}#dust{display:none;}}
</style>
</head>
<body>
<canvas id="dust"></canvas>
<svg width="0" height="0" style="position:absolute"><defs>

var state = { name:"", idx:0, answers:{}, started:false };

var STORAGE_KEY = "kokoro-specimen:m-mode:bigfive120:v1";

function storageOK(){
  try{
    var k="__m_mode_test__";
    localStorage.setItem(k,"1");
    localStorage.removeItem(k);
    return true;
  }catch(e){
    return false;
  }
}
var CAN_SAVE = storageOK();

function answerCount(ans){
  var n=0;
  if(!ans) return 0;
  for(var k in ans){
    if(ans.hasOwnProperty(k) && ans[k]!=null) n++;
  }
  return n;
}
function saveProgress(done){
  if(!CAN_SAVE) return;
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version:1,
      name:state.name || "",
      idx:Math.min(state.idx || 0, QUESTIONS.length),
      answers:state.answers || {},
      started:!!state.started,
      done:!!done || state.idx>=QUESTIONS.length,
      updatedAt:Date.now()
    }));
  }catch(e){}
}
function loadProgress(){
  if(!CAN_SAVE) return null;
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    var data=JSON.parse(raw);
    if(!data || !data.answers) return null;
    return data;
  }catch(e){
    return null;
  }
}
function clearProgress(){
  if(!CAN_SAVE) return;
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
}
function formatSavedTime(ts){
  if(!ts) return "保存日時不明";
  var d=new Date(ts);
  if(isNaN(d.getTime())) return "保存日時不明";
  return d.getFullYear()+"/"+p2(d.getMonth()+1)+"/"+p2(d.getDate())+" "+p2(d.getHours())+":"+p2(d.getMinutes());
}

function reduced(){ return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }
function p2(n){ return n<10?"0"+n:""+n; }

/* ===== 立ち絵切り替え（画像が無ければフォールバック表示） ===== */
var curSpriteKey = null;
function setSprite(key){
  if (key===curSpriteKey) return;
  curSpriteKey = key;
  var file = SPRITES[key];
  if (!file){ showFallback(); return; }
  var test = new Image();
  test.onload = function(){
    spriteImg.src = file;
    spriteImg.classList.add("show");
    spriteFallback.style.display = "none";
    if(!reduced()){ spriteImg.classList.remove("swap"); void spriteImg.offsetWidth; spriteImg.classList.add("swap"); }
    // HUD顔も同じ画像を流用
    setFaceImg(file);
  };
  test.onerror = function(){ showFallback(); };
  test.src = file;
}
function showFallback(){
  spriteImg.classList.remove("show");
  spriteFallback.style.display = "block";
}
function setFaceImg(file){
  faceEl.innerHTML = "";
  var im = document.createElement("img");
  im.onerror = function(){ faceEl.className = faceEl.className.replace(" hasimg",""); faceEl.innerHTML=""; };
  im.src = file;
  faceEl.appendChild(im);
  if (faceEl.className.indexOf("hasimg")<0) faceEl.className += " hasimg";
}

/* フェーズ＆相性から立ち絵キーを決める */
function spriteForPhase(secIdx){
  var lv = affinity();
  // 終盤かつ高相性なら依存表情、低相性なら不安表情
  if (secIdx>=4){
    if (lv>=0.78) return "cling";
    if (lv>=0.5)  return "blush";
    return "anxious";
  }
  if (secIdx>=2 && lv>=0.66) return "smile";
  if (lv<0.32 && secIdx>=1)  return "anxious";
  return PHASE_FACE[secIdx] || "normal";
}

function affinity(){

  var sums={}, cnts={}, answered=0;

  for (var i=0;i<QUESTIONS.length;i++){

    var q=QUESTIONS[i];

    if (state.answers[q.id]==null) continue;

    var raw=state.answers[q.id];
    var sc=q.reverse?(6-raw):raw;
    var f=SECTIONS[q.sec].factor;

    if(!sums[f]){sums[f]=0;cnts[f]=0;}

    sums[f]+=sc;
    cnts[f]++;
    answered++;

  }

  if(!answered) return 0;

  var wsum=0, acc=0;

  for (var f in sums){ if(!sums.hasOwnProperty(f)) continue;

    var avg=sums[f]/cnts[f];
    var diff=Math.abs(avg-(NIR[f]||3));
    var fit=Math.pow(Math.max(0,1-(diff/4)),1.35);
    var w=WEIGHT[f]||1;

    acc+=fit*w;
    wsum+=w;

  }

  var rawAffinity=wsum ? (acc/wsum) : 0;
  var coverage=Math.min(answered/QUESTIONS.length,1);
  var confidence=Math.sqrt(coverage);

  return Math.max(0,Math.min(1,0.5 + (rawAffinity-0.5)*confidence));

}

function typeInto(el, text, cb){
  if(reduced()){ el.innerHTML=esc(text); if(cb)cb(); return; }
  var caret=document.createElement("span"); caret.className="caret"; el.appendChild(caret);
  var i=0;
  (function step(){

    var ch=text.charAt(i++);
    if(ch==="\n") el.insertBefore(document.createElement("br"),caret);
    else el.insertBefore(document.createTextNode(ch),caret);
    setTimeout(step, /[…。、！？]/.test(ch)?140:30);
  })();
}

function factorScores(){

    var q=QUESTIONS[i], raw=state.answers[q.id]||0, sc=q.reverse?(6-raw):raw, sx=SECTIONS[q.sec], f=sx.factor;
    if(!dom[f]) dom[f]={t:0,n:0,name:sx.name};
    dom[f].t+=sc; dom[f].n++;
  }
  return dom;
}
function facetScores(){
  var facets={};
  for(var i=0;i<QUESTIONS.length;i++){
    var q=QUESTIONS[i], raw=state.answers[q.id]||0, sc=q.reverse?(6-raw):raw, sx=SECTIONS[q.sec];
    var key=q.facetKey || q.facet || "NA";
    var name=q.facetName || q.facet || key;
    if(!facets[key]) facets[key]={t:0,n:0,name:name,domain:sx.factor,domainName:sx.name};
    facets[key].t+=sc; facets[key].n++;
  }
  return facets;
}
function rank(dom){
  var arr=[];
  for(var f in dom){ if(dom.hasOwnProperty(f)) arr.push({f:f, a:dom[f].t/dom[f].n, name:dom[f].name}); }
  arr.sort(function(x,y){ return y.a-x.a; });
  return arr;
}
function rankFacets(facets){
  var arr=[];
  for(var f in facets){
    if(facets.hasOwnProperty(f)){
      arr.push({
        f:f,
        a:facets[f].t/facets[f].n,
        name:facets[f].name,
        domain:facets[f].domain,
        domainName:facets[f].domainName
      });
    }
  }
  arr.sort(function(x,y){ return y.a-x.a; });
  return arr;
}

      '<div class="story-h">BIG FIVE ／ 5因子</div>'+
      '<div class="rbars">'+bars+'</div>'+
      '<div class="marknote"><i></i> 緑のラインは「ニア（製作者）」の5因子値。近いほど相性◎</div>'+
      '<div class="story-h">FACETS ／ 30下位因子</div>'+
      '<div class="rbars">'+facetBars+'</div>'+
      '<div class="note">ここに出てるのは、120問で見た君の断片。<br>このデータを<b>製作者に渡して</b>。もっと奥まで読んでほしいから。</div>'+
      '<div class="out-actions">'+
        '<button class="gen" id="genBtn">証拠を書き出す</button>'+
        '<button class="copy" id="copyBtn">コピー</button>'+
      '</div>'+
      '<div class="outbox" id="outbox"><div class="out-head">SPECIMEN DATA ／ 設問+回答</div>'+
        '<textarea id="outtext" readonly></textarea></div>'+
      '<button class="restart" id="restartBtn">もう一度、最初から</button>'+
    '</div>';

  setTimeout(function(){
    var fills=panel.querySelectorAll(".rb-fill");
    for(var i=0;i<fills.length;i++) fills[i].style.width=fills[i].getAttribute("data-w")+"%";
  },120);

  document.getElementById("genBtn").addEventListener("click", buildResult);
  document.getElementById("copyBtn").addEventListener("click", copyResult);
  document.getElementById("restartBtn").addEventListener("click", function(){
    clearProgress();
    showIntro();
  });
}

function buildResult(){
  var name=state.name||"（名前なし）", now=new Date();
  var dt=now.getFullYear()+"/"+p2(now.getMonth()+1)+"/"+p2(now.getDate())+"  "+p2(now.getHours())+":"+p2(now.getMinutes());
  var dom=factorScores(), facets=facetScores(), ranked=rank(dom), facetRank=rankFacets(facets), top=ranked[0].f, ty=TYPE_BY_TOP[top]||{name:"未分類"};
  var lv=affinity(), end=ending(lv);
  var L=[
    "==========================================",
    "心の標本 ／ 隠しモード・採取記録",
    "Big Five 恋愛診断データ（ADV試作・120問版）",
    "==========================================",
    "回答者　：" + name,
    "採取日時：" + dt,
    "尺度　　：1=全然ちがう / 2=あまり / 3=どちらとも / 4=ややそう / 5=すごくそう",
    "凡例　　：[逆]=逆転項目（採点時に反転）",
    "簡易タイプ："+ty.name,
    "エンディング："+end.tag+"（"+end.verdict+"）",
    "ニア相性："+Math.round(lv*100)+"%",
    "備考　　：30下位因子まで追加解釈する想定。設問文ごと渡しています。",
    "",
    "------------------------------------------",
    "■ 設問と回答（採取順）",
    "------------------------------------------"
  ];
  for(var i=0;i<QUESTIONS.length;i++){
    var q=QUESTIONS[i], sx=SECTIONS[q.sec], raw=state.answers[q.id]||0, sc=q.reverse?(6-raw):raw, rev=q.reverse?" [逆]":"";
    L.push("","["+q.id+"] "+sx.name+"("+sx.factor+") › "+q.facet+rev,
      "  Q. "+q.text, "  A. "+raw+" = "+(SCALE[raw-1]||"未回答")+"  ／ 採点後 "+sc+"/5");
  }
  L.push("","------------------------------------------","■ Big Five 5因子スコア（平均・採点後／参考：ニア値）","------------------------------------------");
  var order=["O","C","E","A","N"];
  for(var j=0;j<order.length;j++){ var f=order[j]; if(!dom[f])continue;
    L.push(f+" "+dom[f].name+"　：" + (dom[f].t/dom[f].n).toFixed(2) + " / 5　(ニア "+NIR[f].toFixed(2)+")"); }

  L.push("","------------------------------------------","■ 30下位因子スコア（平均・採点後）","------------------------------------------");
  for(var k=0;k<facetRank.length;k++){
    var ft=facetRank[k];
    L.push(ft.f+" "+ft.name+"（"+ft.domainName+" / "+ft.domain+"）：" + ft.a.toFixed(2) + " / 5");
  }

  L.push("","==========================================");
  document.getElementById("outtext").value=L.join("\n");
  document.getElementById("outbox").style.display="block";
}

function showToast(){ var t=document.getElementById("toast"); t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},1800); }
function copyResult(){
  var ta=document.getElementById("outtext");
  if(!ta||!ta.value) buildResult();
  ta=document.getElementById("outtext"); if(!ta.value) return;
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(ta.value).then(showToast)["catch"](function(){fallbackCopy(ta);}); }
  else fallbackCopy(ta);
}
function fallbackCopy(ta){
  ta.removeAttribute("readonly"); ta.select(); ta.setSelectionRange(0,99999);
  try{document.execCommand("copy");showToast();}catch(e){}
  ta.setAttribute("readonly","readonly");
  if(window.getSelection&&window.getSelection().removeAllRanges) window.getSelection().removeAllRanges();
}

/* 光の粒 */
(function(){
  var cv=document.getElementById("dust"); if(!cv||!cv.getContext) return;
  var cx=cv.getContext("2d"),W=0,H=0,ps=[],love=0;
  function rs(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; } rs();
  window.addEventListener("resize",rs);
  for(var i=0;i<32;i++){ ps.push({x:Math.random(),y:Math.random(),r:Math.random()*1.6+0.6,spd:Math.random()*0.0004+0.0001,ph:Math.random()*6.28,pink:Math.random()<0.3}); }
  window.__dustLove=function(v){ love=v; };
  function draw(t){
    cx.clearRect(0,0,W,H);
    for(var i=0;i<ps.length;i++){ var p=ps[i]; p.y-=p.spd*(1+love*0.5);
      if(p.y<-0.02){p.y=1.02;p.x=Math.random();}
      var tw=0.5+0.5*Math.sin(t*0.0012+p.ph), a=(0.08+0.28*tw)*(0.5+love*0.5);
      cx.beginPath(); cx.arc(p.x*W,p.y*H,p.r,0,6.2832);
      cx.fillStyle=p.pink?"rgba(255,132,191,"+a.toFixed(3)+")":"rgba(201,157,255,"+a.toFixed(3)+")"; cx.fill();
    }
  }
  if(reduced()){ draw(0); } else { (function loop(t){ draw(t||0); window.requestAnimationFrame(loop); })(); }
})();

showIntro();
</script>
</body>
</html>
